name: MATLAB Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: self-hosted
            release: latest
            products: Symbolic_Math_Toolbox

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@bash

      - name: Display mpm log
        if: always()
        shell: pwsh
        run: |
          $logfile = & matlab -batch "disp(fullfile(prefdir,'mpm.log'))" | Out-String
          $logfile = $logfile.Trim()
          if (Test-Path $logfile) {
            Get-Content $logfile
          } else {
            Write-Output "mpm.log not found at $logfile"
          }
      - name: Run all tests
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: code

      # Uncomment and adjust other steps as needed
