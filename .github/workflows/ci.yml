name: MATLAB Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: self-hosted
            release: latest
            products: Symbolic_Math_Toolbox

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@bash

      - name: Display mpm log
        if: always()
        run: |
          matlab -batch "logfile = fullfile(prefdir,'mpm.log'); if exist(logfile, 'file'), type(logfile), else, disp('mpm.log not found'), end"

      - name: Run all tests
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: code

      # Uncomment and adjust other steps as needed
